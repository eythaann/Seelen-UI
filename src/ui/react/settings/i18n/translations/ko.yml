  enable: 타일링 윈도우 관리자 활성화
  layout: 레이아웃
  resize_delta: 크기 조정 수치 (%)
  space_between_containers: 컨테이너 간 간격
  workspace_offset: 작업 공간 바깥 여백
  workspace_padding: 작업 공간 안쪽 여백
'yes': 예
