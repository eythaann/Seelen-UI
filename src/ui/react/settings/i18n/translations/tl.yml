welcome:
  give_a_review: Magbigay ng Review
  message: >-
    Ang Seelen UI ay isang libre at open source na desktop environment para sa
    Windows. Dito mayroon kang ganap na kontrol sa hitsura at pag-uugali ng
    iyong desktop, na nagbibigay-daan sa iyong i-customize ang bawat detalye
    upang tumugma sa iyong daloy ng trabaho at istilo.
  ok: Magsimula na tayo!
  review: >-
    Kung masisiyahan ka sa paggamit ng Seelen UI, isaalang-alang ang pag-iwan ng
    review sa tindahan — ang iyong feedback ay nakakatulong sa proyekto na
    lumago at umunlad.
  title: Maligayang pagdating sa Seelen UI!
