welcome:
  give_a_review: একটি পর্যালোচনা দিন
  message: >-
    Seelen UI হল উইন্ডোজের জন্য একটি বিনামূল্যের এবং ওপেন সোর্স ডেস্কটপ পরিবেশ।
    এখানে আপনার ডেস্কটপ কেমন দেখায় এবং আচরণ করে তার উপর আপনার সম্পূর্ণ
    নিয়ন্ত্রণ রয়েছে, আপনাকে আপনার কর্মপ্রবাহ এবং শৈলীর সাথে মেলে প্রতিটি বিবরণ
    কাস্টমাইজ করার অনুমতি দেয়।
  ok: শুরু করা যাক!
  review: >-
    আপনি যদি Seelen UI ব্যবহার করে উপভোগ করেন, তাহলে দোকানে একটি পর্যালোচনা করার
    কথা বিবেচনা করুন — আপনার প্রতিক্রিয়া প্রকল্পের বৃদ্ধি এবং উন্নতিতে সাহায্য
    করে।
