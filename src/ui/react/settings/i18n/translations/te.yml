welcome:
  give_a_review: రివ్యూ ఇవ్వండి
  message: >-
    సీలెన్ UI అనేది Windows కోసం ఉచిత మరియు ఓపెన్ సోర్స్ డెస్క్‌టాప్ వాతావరణం.
    ఇక్కడ మీ డెస్క్‌టాప్ ఎలా కనిపిస్తుంది మరియు ప్రవర్తిస్తుంది అనే దానిపై మీకు
    పూర్తి నియంత్రణ ఉంటుంది, ఇది మీ వర్క్‌ఫ్లో మరియు స్టైల్‌కు సరిపోయేలా ప్రతి
    వివరాలను అనుకూలీకరించడానికి మిమ్మల్ని అనుమతిస్తుంది.
  ok: ప్రారంభిద్దాం!
  review: >-
    మీరు సీలెన్ UIని ఉపయోగించడం ఆనందించినట్లయితే, స్టోర్‌లో సమీక్షను
    అందించడాన్ని పరిగణించండి - మీ అభిప్రాయం ప్రాజెక్ట్ అభివృద్ధి చెందడానికి
    మరియు మెరుగుపరచడంలో సహాయపడుతుంది.
