welcome:
  give_a_review: Dajte recenziu
  message: >-
    Seelen UI je bezplatné a open source desktopové prostredie pre Windows. Tu
    máte plnú kontrolu nad tým, ako vaša pracovná plocha vyzerá a ako sa správa,
    čo vám umožňuje prispôsobiť každý detail tak, aby zodpovedal vášmu
    pracovnému postupu a štýlu.
  ok: Začnime!
  review: >-
    Ak radi používate používateľské rozhranie Seelen, zvážte zanechanie recenzie
    v obchode – vaša spätná väzba pomáha projektu rásť a zlepšovať sa.
