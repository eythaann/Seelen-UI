  default_instance_hint: бһҹбһҖбһҳбҹ’бһҳбһҮбһ¶бһ“бһ·бһ…бҹ’бһ… бһ”бҹ’бһҡбһҫбһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһ’бһ¶бһҸбһ»бһҖбҹ’бһҡбһ¶бһ бҹ’бһңбһ·бһҖбһ«бһҹ
  enable: бһ”бһҫбһҖбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ’бһ¶бһҸбһ»бһҖбҹ’бһҡбһ¶бһ бҹ’бһңбһ·бһҖбһ“бҹҒбҹҮ
  enable_for_monitor: бһ”бһҫбһҖбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҳбҹүбһјбһ“бһёбһ‘бҹҗбһҡбһ“бҹҒбҹҮ
  extra_instances: бһҖбһҡбһҺбһёбһ”бһ“бҹ’бһҗбҹӮбһҳ
  instance: бһ§
  instances: бһҖбһҡбһҺбһёбһ”бһ»бһҳ
wm:
  animations:
    duration: бһҡбһҷбҹҲбһ–бҹҒбһӣбһ…бһӣбһ“бһ¶ (MS)
    ease_function: бһҳбһ»бһҒбһ„бһ¶бһҡбһ”бһ“бҹ’бһ’бһјбһҡбһ”бһ“бҹ’бһҗбһҷбһ…бһӣбһ“бһ¶
    enable: бһ”бһҫбһҖбһ…бһӣбһ“бһ¶бһ…бһӣбһ“бһ¶бһҡбһ”бһҹбҹӢбһ”бһ„бҹ’бһўбһҪбһ…
  author: бһўбҹ’бһ“бһҖбһ“бһ·бһ–бһ“бҹ’бһ’
  border:
    enable: бһ”бһҫбһҖбһҹбҹҠбһ»бһҳбһ”бһ„бҹ’бһўбһҪбһ…
    offset: бһ–бҹ’бһҡбҹҶбһҠбҹӮбһ“бһўбһ»бһ бҹ’бһңбһҹбһ·бһҸ
    width: бһ‘бһ‘бһ№бһ„бһ–бҹ’бһҡбҹҶбһҠбҹӮбһ“
  description: бһҖбһ¶бһҡбһ–бһ·бһ–бһҺбҹҢбһ“бһ¶
  drag_behavior: бһҘбһҡбһ·бһҷбһ¶бһ”бһ‘бһўбһјбһҹ
  drag_behavior_options:
    sort: бһҸбһҳбҹ’бһҡбҹҖбһ” (бһҸбһҳбҹ’бһҡбҹҖбһ”бһ”бһ„бҹ’бһўбһҪбһ…бһЎбһҫбһ„бһңбһ·бһүбһ–бҹҒбһӣбһҖбҹҶбһ–бһ»бһ„бһўбһјбһҹ)
    swap: бһ”бҹ’бһҸбһјбһҡ (бһ”бҹ’бһҸбһјбһҡбһ”бһ„бҹ’бһўбһҪбһ…бһ“бҹ…бһӣбһҫбһ…бһ»бһ„бһўбһјбһҹ)
  enable: бһ”бһҫбһҖбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҖбһҳбҹ’бһҳбһңбһ·бһ’бһёбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһ”бһ„бҹ’бһўбһҪбһ…
  layout: бһ”бҹ’бһӣбһ„бҹӢ
  resize_delta: бһ”бҹ’бһҸбһјбһҡбһ‘бҹҶбһ бҹҶбһҠбһёбһҹбһҺбҹ’бһҸбһҡ (%)
  space_between_containers: бһ…бһ“бҹ’бһӣбҹ„бҹҮбһҡбһңбһ¶бһ„бһҖбһ»бһ„бһҸбһәбһ“бҹҗбһҡ
  workspace_offset: бһҖбһ“бҹ’бһӣбҹӮбһ„бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһўбһ»бһ бҹ’бһңбһҹбһ·бһҸ (бһҡбһ№бһҳ)
  workspace_padding: бһ…бһ“бҹ’бһӣбҹ„бҹҮбһҖбһ“бҹ’бһӣбҹӮбһ„бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ
'yes': бһ”бһ¶бһҸ
