welcome:
  give_a_review: एक समीक्षा दें
  message: >-
    सीलेन यूआई विंडोज़ के लिए एक मुफ़्त और खुला स्रोत डेस्कटॉप वातावरण है। यहां
    आपका डेस्कटॉप कैसा दिखता है और कैसे व्यवहार करता है, इस पर आपका पूरा
    नियंत्रण होता है, जिससे आप अपने वर्कफ़्लो और शैली से मेल खाने के लिए हर
    विवरण को अनुकूलित कर सकते हैं।
  ok: चलो शुरू करो!
  review: >-
    यदि आप सेलेन यूआई का उपयोग करना पसंद करते हैं, तो स्टोर पर एक समीक्षा छोड़ने
    पर विचार करें - आपकी प्रतिक्रिया परियोजना को बढ़ने और बेहतर बनाने में मदद
    करती है।
  title: सीलेन यूआई में आपका स्वागत है!
