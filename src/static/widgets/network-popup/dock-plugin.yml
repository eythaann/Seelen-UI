id: "@seelen/dock-network-popup"
metadata:
  displayName: !extend i18n/display_name.yml
  description: !extend i18n/description.yml
icon: FaWifi
target: "@seelen/weg"
plugin:
  scopes:
    - Network
  renderer: !include dock_plugin.js
  tooltip: >-
    return usingInterface?.type === "IEEE80211" ? "Wi-Fi" : online ? "Ethernet" : "Disconnected";
  onClick: |-
    trigger("@seelen/network-popup");
