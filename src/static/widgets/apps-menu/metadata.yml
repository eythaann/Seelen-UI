id: "@seelen/apps-menu"
metadata:
  displayName: !extend i18n/display_name.yml
  description: !extend i18n/description.yml
instances: Single
loader: Internal
preset: Overlay
hidden: true
# lazy: true
settings:
  - type: switch
    key: acrylic
    label: !extend i18n/settings/acrylic.yml
    defaultValue: false
shortcuts:
  - id: apps-menu-toggle
    command: ["widget", "trigger", "${self.id}"]
    label: !extend i18n/shortcuts/apps-menu-toggle.yml
    defaultKeys: ["Win"]
    readonly: true
    system: true
