id: "@seelen/apps-menu"
metadata:
  displayName: !extend i18n/display_name.yml
  description: !extend i18n/description.yml
instances: Single
loader: Internal
preset: Overlay
hidden: true
# lazy: true
settings:
  - type: switch
    key: acrylic
    label: Acrylic Effect
    defaultValue: false
shortcuts:
  - id: apps-menu-toggle
    command: ["widget", "trigger", "@seelen/apps-menu"]
    label: Toggle Apps Menu
    defaultKeys: ["Win"]
    readonly: true
    system: true
