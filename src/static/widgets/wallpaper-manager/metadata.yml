id: "@seelen/wallpaper-manager"
icon: PiWallDuotone
metadata:
  displayName: !extend i18n/display_name.yml
loader: Legacy
instances: Single
noMemoryLeakWorkaround: true
shortcuts:
  - id: wallpaper-next
    command: ["wallpaper", "next"]
    label: !extend i18n/shortcuts/wallpaper-next.yml
    defaultKeys: ["Ctrl", "Win", "Up"]
  - id: wallpaper-prev
    command: ["wallpaper", "prev"]
    label: !extend i18n/shortcuts/wallpaper-prev.yml
    defaultKeys: ["Ctrl", "Win", "Down"]
