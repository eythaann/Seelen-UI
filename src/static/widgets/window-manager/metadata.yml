id: "@seelen/window-manager"
icon: BsGrid1X2Fill
metadata:
  displayName: !extend i18n/display_name.yml
loader: Legacy
instances: ReplicaByMonitor
shortcuts:
  # =========== MODES ===========
  - id: wm-toggle
    command: ["wm", "toggle"]
    label: !extend i18n/shortcuts/wm-toggle.yml
    defaultKeys: ["Win", "P"]

  - id: wm-toggle-float
    command: ["wm", "toggle-float"]
    label: !extend i18n/shortcuts/wm-toggle-float.yml
    defaultKeys: ["Win", "F"]

  - id: wm-toggle-monocle
    command: ["wm", "toggle-monocle"]
    label: !extend i18n/shortcuts/wm-toggle-monocle.yml
    defaultKeys: ["Win", "M"]

  # =========== STACK ===========

  - id: wm-cycle-stack-next
    command: ["wm", "cycle-stack", "next"]
    label: !extend i18n/shortcuts/wm-cycle-stack-next.yml
    defaultKeys: ["Win", "Q"]

  - id: wm-cycle-stack-prev
    command: ["wm", "cycle-stack", "prev"]
    label: !extend i18n/shortcuts/wm-cycle-stack-prev.yml
    defaultKeys: ["Win", "Shift", "Q"]

  # =========== LAYOUT RESERVATION ===========

  - id: wm-reserve-top
    command: ["wm", "reserve", "top"]
    label: !extend i18n/shortcuts/wm-reserve-top.yml
    defaultKeys: ["Win", "Shift", "I"]

  - id: wm-reserve-bottom
    command: ["wm", "reserve", "bottom"]
    label: !extend i18n/shortcuts/wm-reserve-bottom.yml
    defaultKeys: ["Win", "Shift", "K"]

  - id: wm-reserve-left
    command: ["wm", "reserve", "left"]
    label: !extend i18n/shortcuts/wm-reserve-left.yml
    defaultKeys: ["Win", "Shift", "J"]

  - id: wm-reserve-right
    command: ["wm", "reserve", "right"]
    label: !extend i18n/shortcuts/wm-reserve-right.yml
    defaultKeys: ["Win", "Shift", "L"]

  - id: wm-reserve-float
    command: ["wm", "reserve", "float"]
    label: !extend i18n/shortcuts/wm-reserve-float.yml
    defaultKeys: ["Win", "Shift", "U"]

  - id: wm-reserve-stack
    command: ["wm", "reserve", "stack"]
    label: !extend i18n/shortcuts/wm-reserve-stack.yml
    defaultKeys: ["Win", "Shift", "O"]

  # =========== FOCUS MOVEMENT ===========

  - id: wm-focus-up
    command: ["wm", "focus", "up"]
    label: !extend i18n/shortcuts/wm-focus-up.yml
    defaultKeys: ["Alt", "I"]

  - id: wm-focus-down
    command: ["wm", "focus", "down"]
    label: !extend i18n/shortcuts/wm-focus-down.yml
    defaultKeys: ["Alt", "K"]

  - id: wm-focus-left
    command: ["wm", "focus", "left"]
    label: !extend i18n/shortcuts/wm-focus-left.yml
    defaultKeys: ["Alt", "J"]

  - id: wm-focus-right
    command: ["wm", "focus", "right"]
    label: !extend i18n/shortcuts/wm-focus-right.yml
    defaultKeys: ["Alt", "L"]

  # =========== WINDOW SIZING ===========

  - id: wm-increase-width
    command: ["wm", "width", "increase"]
    label: !extend i18n/shortcuts/wm-increase-width.yml
    defaultKeys: ["Win", "Alt", "="]

  - id: wm-decrease-width
    command: ["wm", "width", "decrease"]
    label: !extend i18n/shortcuts/wm-decrease-width.yml
    defaultKeys: ["Win", "Alt", "-"]

  - id: wm-increase-height
    command: ["wm", "height", "increase"]
    label: !extend i18n/shortcuts/wm-increase-height.yml
    defaultKeys: ["Win", "Ctrl", "="]

  - id: wm-decrease-height
    command: ["wm", "height", "decrease"]
    label: !extend i18n/shortcuts/wm-decrease-height.yml
    defaultKeys: ["Win", "Ctrl", "-"]

  - id: wm-restore-sizes
    command: ["wm", "reset-workspace-size"]
    label: !extend i18n/shortcuts/wm-restore-sizes.yml
    defaultKeys: ["Win", "Alt", "0"]

  # =========== WINDOW MOVEMENT ===========

  - id: wm-move-up
    command: ["wm", "move", "up"]
    label: !extend i18n/shortcuts/wm-move-up.yml
    defaultKeys: ["Shift", "Alt", "I"]

  - id: wm-move-down
    command: ["wm", "move", "down"]
    label: !extend i18n/shortcuts/wm-move-down.yml
    defaultKeys: ["Shift", "Alt", "K"]

  - id: wm-move-left
    command: ["wm", "move", "left"]
    label: !extend i18n/shortcuts/wm-move-left.yml
    defaultKeys: ["Shift", "Alt", "J"]

  - id: wm-move-right
    command: ["wm", "move", "right"]
    label: !extend i18n/shortcuts/wm-move-right.yml
    defaultKeys: ["Shift", "Alt", "L"]
