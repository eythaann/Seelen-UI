id: "@seelen/flyouts"
icon: LuRectangleEllipsis
metadata:
  displayName: !extend i18n/display_name.yml
  description: !extend i18n/description.yml
loader: Internal
preset: Overlay
settings:
  - type: select
    key: placement
    label: !extend i18n/settings/placement.yml
    options:
      - label: !extend i18n/settings/placement-top-left.yml
        value: top-left
        icon: TbBoxAlignTopLeft

      - label: !extend i18n/settings/placement-top.yml
        value: top
        icon: TbBoxAlignTop

      - label: !extend i18n/settings/placement-top-right.yml
        value: top-right
        icon: TbBoxAlignTopRight

      - label: !extend i18n/settings/placement-left.yml
        value: left
        icon: TbBoxAlignLeft

      - label: !extend i18n/settings/placement-right.yml
        value: right
        icon: TbBoxAlignRight

      - label: !extend i18n/settings/placement-bottom-left.yml
        value: bottom-left
        icon: TbBoxAlignBottomLeft

      - label: !extend i18n/settings/placement-bottom.yml
        value: bottom
        icon: TbBoxAlignBottom

      - label: !extend i18n/settings/placement-bottom-right.yml
        value: bottom-right
        icon: TbBoxAlignBottomRight
    defaultValue: top

  - type: number
    key: margin
    label: !extend i18n/settings/margin.yml
    min: 0
    defaultValue: 30

  - type: number
    key: timeToShow
    label: !extend i18n/settings/time-to-show.yml
    min: 1
    max: 10
    defaultValue: 4

  - group:
      label: !extend i18n/settings/show-on.yml
      items:
        - type: switch
          key: showBrightnessChange
          label: !extend i18n/settings/show-brightness-change.yml
          defaultValue: true

        - type: switch
          key: showVolumeChange
          label: !extend i18n/settings/show-volume-change.yml
          defaultValue: true

        - type: switch
          key: showMediaPlayerChange
          label: !extend i18n/settings/show-media-player-change.yml
          defaultValue: true

        - type: switch
          key: showWorkspaceChange
          label: !extend i18n/settings/show-workspace-change.yml
          defaultValue: true

        - type: switch
          key: showNotifications
          label: !extend i18n/settings/show-notifications.yml
          defaultValue: true
