  files_integrity: >-
    ਅਸੀਂ ਐਪਲੀਕੇਸ਼ਨ ਫਾਈਲਾਂ ਦੀ ਇਕਸਾਰਤਾ ਦੀ ਪੁਸ਼ਟੀ ਨਹੀਂ ਕਰ ਸਕੇ।

    ਇਹ ਉਦੋਂ ਹੋ ਸਕਦਾ ਹੈ ਜੇਕਰ ਫਾਈਲਾਂ ਨੂੰ ਸੋਧਿਆ ਗਿਆ ਸੀ, ਖਰਾਬ ਕੀਤਾ ਗਿਆ ਸੀ, ਜਾਂ
    ਇੰਸਟਾਲੇਸ਼ਨ ਅਧੂਰੀ ਹੈ।

