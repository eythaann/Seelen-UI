elevated:
  description: >-
    ਸੀਲਨ UI ਪ੍ਰਸ਼ਾਸਕ ਦੇ ਅਧਿਕਾਰਾਂ ਨਾਲ ਚੱਲ ਰਿਹਾ ਹੈ।

    ਇਹ ਕਿਸੇ ਵੀ ਵਿਸ਼ੇਸ਼ਤਾਵਾਂ ਨੂੰ ਜੋੜਦਾ ਜਾਂ ਸੁਧਾਰਦਾ ਨਹੀਂ ਹੈ, ਅਤੇ ਇਹ ਇੱਕ ਸੁਰੱਖਿਆ
    ਜੋਖਮ ਪੈਦਾ ਕਰ ਸਕਦਾ ਹੈ।

    ਬਿਹਤਰ ਸੁਰੱਖਿਆ ਲਈ, ਕਿਰਪਾ ਕਰਕੇ ਪ੍ਰਸ਼ਾਸਕ ਦੀ ਇਜਾਜ਼ਤ ਤੋਂ ਬਿਨਾਂ ਇਸਨੂੰ ਮੁੜ ਚਾਲੂ
    ਕਰੋ।
  title: ਪ੍ਰਸ਼ਾਸਕ ਵਜੋਂ ਚੱਲ ਰਿਹਾ ਹੈ
