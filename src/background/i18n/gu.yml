  description: >-
    સીલેન UI એડમિનિસ્ટ્રેટર વિશેષાધિકારો સાથે ચાલી રહ્યું છે.

    આ કોઈપણ સુવિધાઓ ઉમેરતું નથી અથવા સુધારતું નથી, અને તે સુરક્ષા જોખમ ઊભું કરી
    શકે છે.

    બહેતર સુરક્ષા માટે, કૃપા કરીને તેને એડમિનિસ્ટ્રેટરની પરવાનગી વિના
    પુનઃપ્રારંભ કરો.
