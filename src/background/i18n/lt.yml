    Seelen vartotojo sąsaja veikia su administratoriaus teisėmis.

    Tai neprideda ir nepatobulina jokių funkcijų ir gali kelti pavojų saugumui.

    Norėdami užtikrinti didesnį saugumą, paleiskite jį iš naujo be
    administratoriaus leidimo.
