  not_found: WebView2 vykdymo laikas nerastas
  not_found_description: „Seelen“ vartotojo sąsajai reikalinga „Webview2 Runtime“. Įdiekite jį.
  outdated: „WebView2“ vykdymo laikas pasenęs
  outdated_description: >-
    „Seelen“ vartotojo sąsajai reikalinga „Webview2 Runtime“ %{min_version} arba
    naujesnė versija. Prašome atnaujinti.
