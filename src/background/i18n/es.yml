auth:
  login_failed_body: >-
    Algo salió mal durante el inicio de sesión. Si esto persiste, asegúrese de
    que el servicio 'Administrador de credenciales' de Windows (VaultSvc) esté
    habilitado y ejecutándose, luego inténtelo nuevamente.
  login_failed_title: error de inicio de sesion
cancel: Cancelar
done: Hecho
elevated:
  description: >-
    La interfaz de usuario de Seelen se ejecuta con privilegios de
    administrador.

    Esto no agrega ni mejora ninguna característica y puede representar un
    riesgo de seguridad.

    Para mayor seguridad, reinícielo sin permisos de administrador.
  title: Corriendo como administradora
file_explorer: Exploradora de archivos
resource:
  added: Se ha añadido un nuevo recurso
  download_failed_body: >-
    Algo ha ido mal al descargar el recurso, por favor informa de ello al equipo
    de desarrolladores de Seelen.
  download_failed_title: Fallo en la descarga de recursos
  downloading: Descarga de activos...
  downloading_body: Esto puede tardar unos segundos, por favor no cierre la ventana.
  enable: Activar
  login_required_action: Iniciar sesión
  login_required_body: Debes iniciar sesión para descargar este recurso.
  login_required_title: Iniciar sesión requerido
runtime:
  corrupted_data: Datos dañados
  corrupted_file: >-
    Un archivo de configuración está dañado, utilizando valores por defecto en
    su lugar.
  corrupted_file_path: Ruta de archivo dañada
  download: Ir a la página de descarga
  files_integrity: >-
    No pudimos verificar la integridad de los archivos de la aplicación.

    Esto puede suceder si los archivos fueron modificados, dañados o la
    instalación está incompleta.

    Por razones de seguridad, Seelen UI no puede continuar.

    Vuelva a instalarlo desde el sitio web oficial.
  files_integrity_title: "Alerta de seguridad: error en la comprobación de integridad de archivos"
  not_found: Tiempo de ejecución de WebView2 no encontrado
  not_found_description: >-
    La interfaz de usuario de Seelen requiere Webview2 Runtime. Por favor
    instálelo.
  outdated: Tiempo de ejecución de WebView2 desactualizado
  outdated_description: >-
    La interfaz de usuario de Seelen requiere Webview2 Runtime %{min_version} o
    superior. Por favor actualícelo.
service:
  not_running: El servicio Seelen UI no se ejecuta
  not_running_description: >-
    Seelen UI Service (slu-service) es una dependencia/ayudante para que la
    aplicación funcione correctamente.
  not_running_ok: Iniciar servicio
shortcut:
  conflicts:
    body: Algunos atajos están asignados a múltiples acciones; reasígnalos.
    dismiss: Despedir
    review: Revisar
    title: Conflictos de acceso directo detectados
  register:
    placeholder: Presione cualquier combinación de teclas
    title: Registrando un nuevo atajo
widget_liveness:
  failed_description: |-
    El widget '%{widget_name}' dejó de responder demasiadas veces.

    Puedes intentar reiniciar la aplicación.
  failed_title: Error de widget
widget_permissions:
  perm_open_file: abrir archivos
  perm_run: ejecutar programas
  request_description: |-
    El widget '%{widget_name}' solicita permiso para %{command}.

    ¿Quieres permitir esto?
  request_title: Solicitud de permiso de widget
