auth:
  login_failed_body: >-
    Nagkaproblema habang nag-log in. Kung magpapatuloy ito, tiyaking naka-enable
    at tumatakbo ang serbisyo ng Windows 'Credential Manager' (VaultSvc),
    pagkatapos ay subukang muli.
  login_failed_title: Nabigo ang pag-login
cancel: Kanselahin
done: Tapos na
elevated:
  description: >-
    Gumagana ang Seelen UI na may mga pribilehiyo ng administrator.

    Hindi ito nagdaragdag o nagpapahusay ng anumang mga tampok, at maaari itong
    magdulot ng panganib sa seguridad.

    Para sa mas mahusay na seguridad, mangyaring i-restart ito nang walang mga
    pahintulot ng administrator.
  title: Tumatakbo bilang Administrator
file_explorer: File Explorer
resource:
  added: Ang isang bagong mapagkukunan ay naidagdag
  download_failed_body: >-
    May mali habang nag -download ng mapagkukunan, mangyaring iulat ito sa
    koponan ng developer ng Seelen.
  download_failed_title: Nabigo ang pag -download ng mapagkukunan
  downloading: Pag -download ng mga assets ...
  downloading_body: Maaaring tumagal ito ng ilang segundo, mangyaring huwag isara ang window.
  enable: Paganahin
  login_required_action: Mag-sign In
  login_required_body: Kailangan mong mag-sign in upang i-download ang mapagkukunang ito.
  login_required_title: Kailangang mag-sign in
runtime:
  corrupted_data: Nasira data
  corrupted_file: >-
    Ang isang file ng pagsasaayos ay nasira, gamit ang mga default na halaga sa
    halip.
  corrupted_file_path: Nasira na landas ng file
  download: Pumunta sa pahina ng pag-download
  files_integrity: >-
    Hindi namin ma-verify ang integridad ng mga file ng application.

    Ito ay maaaring mangyari kung ang mga file ay binago, nasira, o ang
    pag-install ay hindi kumpleto.

    Para sa mga kadahilanang panseguridad, hindi maaaring magpatuloy ang Seelen
    UI.

    Mangyaring muling i-install ito mula sa opisyal na website.
  files_integrity_title: Alerto sa Seguridad - Nabigo ang Pagsusuri ng Integridad ng mga File
  not_found: Hindi nahanap ang WebView2 Runtime
  not_found_description: >-
    Ang Seelen UI ay nangangailangan ng Webview2 Runtime. Mangyaring i-install
    ito.
  outdated: Luma na ang Runtime ng WebView2
  outdated_description: >-
    Ang Seelen UI ay nangangailangan ng Webview2 Runtime %{min_version} o mas
    mataas. Mangyaring i-update ito.
service:
  not_running: Hindi tumatakbo ang Seelen UI Service
  not_running_description: >-
    Ang Seelen UI Service (slu-service) ay isang dependency/helper para gumana
    nang maayos ang app.
  not_running_ok: Simulan ang serbisyo
shortcut:
  conflicts:
    body: >-
      Ang ilang mga shortcut ay itinalaga sa maraming pagkilos, mangyaring
      muling italaga ang mga ito.
    dismiss: I-dismiss
    review: Balik-aral
    title: May Natukoy na Mga Salungatan sa Shortcut
  register:
    placeholder: Pindutin ang anumang key na kumbinasyon
    title: Pagrehistro ng Bagong Shortcut
widget_liveness:
  failed_description: >-
    Ang widget na '%{widget_name}' ay huminto sa pagtugon ng masyadong maraming
    beses.


    Maaari mong subukang i-restart ang app.
  failed_title: Error sa Widget
widget_permissions:
  perm_open_file: buksan ang mga file
  perm_run: magpatakbo ng mga programa
  request_description: |-
    Ang widget na '%{widget_name}' ay humihiling ng pahintulot na %{command}.

    Gusto mo bang payagan ito?
  request_title: Kahilingan ng Pahintulot sa Widget
