    I-Seelen UI isebenza ngamalungelo omlawuli.

    Lokhu akungezi noma akuthuthukisi noma yiziphi izici, futhi kungase kudale
    ingcuphe yezokuphepha.

    Ukuze uthole ukuphepha okungcono, sicela uyiqale kabusha ngaphandle
    kwezimvume zomlawuli.
  title: Isebenza njengomlawuli
