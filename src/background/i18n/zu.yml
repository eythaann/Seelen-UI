    Kukhona okungahambanga kahle ngesikhathi sokungena ngemvume. Uma lokhu
    kuqhubeka, qiniseka ukuthi isevisi ye-Windows 'Credential Manager'
    (VaultSvc) ivuliwe futhi iyasebenza, bese uyazama futhi.
