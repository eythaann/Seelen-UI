elevated:
  description: >-
    Seelen UI нь администраторын эрхтэй ажиллаж байна.

    Энэ нь ямар ч функцийг нэмж, сайжруулахгүй бөгөөд аюулгүй байдалд эрсдэл
    учруулж болзошгүй юм.

    Аюулгүй байдлыг сайжруулахын тулд администраторын зөвшөөрөлгүйгээр дахин
    эхлүүлнэ үү.
  title: Администратороор ажиллаж байна
