    Аюулгүй байдлын үүднээс Seelen UI-г үргэлжлүүлэх боломжгүй.

    Үүнийг албан ёсны вэбсайтаас дахин суулгана уу.
  files_integrity_title: Аюулгүй байдлын дохиолол - Файлын бүрэн бүтэн байдлыг шалгаж чадсангүй
